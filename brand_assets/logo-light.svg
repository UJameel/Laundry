<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 56" width="240" height="56">
  <defs>
    <linearGradient id="drumGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
  </defs>

  <!-- Logo mark: stylized washing machine drum -->
  <g>
    <!-- Outer ring -->
    <circle cx="28" cy="28" r="26" fill="url(#drumGrad)" stroke="#0d9488" stroke-width="2"/>
    <!-- Inner drum circle -->
    <circle cx="28" cy="28" r="19" fill="white" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <!-- Drum fin lines -->
    <line x1="28" y1="11" x2="28" y2="45" stroke="rgba(20,184,166,0.12)" stroke-width="0.75"/>
    <line x1="13.3" y1="19.5" x2="42.7" y2="36.5" stroke="rgba(20,184,166,0.12)" stroke-width="0.75"/>
    <line x1="13.3" y1="36.5" x2="42.7" y2="19.5" stroke="rgba(20,184,166,0.12)" stroke-width="0.75"/>
    <!-- Water level -->
    <clipPath id="drumMask">
      <circle cx="28" cy="28" r="18"/>
    </clipPath>
    <g clip-path="url(#drumMask)">
      <rect x="10" y="30" width="36" height="18" fill="rgba(20,184,166,0.15)" rx="2"/>
      <path d="M10,30 Q19,26 28,30 Q37,34 46,30 L46,48 L10,48 Z" fill="rgba(20,184,166,0.1)"/>
    </g>
    <!-- Dollar symbol in drum -->
    <text x="28" y="33" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700" fill="#14B8A6" text-anchor="middle" opacity="0.7">$</text>
    <!-- Glass highlight -->
    <ellipse cx="22" cy="22" rx="6" ry="4" fill="white" opacity="0.3" transform="rotate(-30,22,22)"/>
    <!-- Control dot (top-left of machine) -->
    <circle cx="14" cy="12" r="2.5" fill="white" opacity="0.8"/>
  </g>

  <!-- Wordmark -->
  <text x="66" y="36" font-family="'Space Grotesk', system-ui, sans-serif" font-size="28" font-weight="700" fill="#e8ecf4" letter-spacing="-0.5">Laundry</text>
</svg>
